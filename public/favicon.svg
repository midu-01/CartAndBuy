<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cartGrad" x1="120" y1="120" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  <!-- Shopping cart body -->
  <path d="M128 148 h36 l12 24 h204 c8 0 14 7 12 15 l-24 100 c-2 8 -9 13 -17 13 H220 c-8 0 -15 -5 -17 -13 L164 172" stroke="url(#cartGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Cart handle curve -->
  <path d="M164 172 L176 208" stroke="url(#cartGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Cart wheels -->
  <circle cx="224" cy="340" r="22" fill="url(#cartGrad)"/>
  <circle cx="356" cy="340" r="22" fill="url(#cartGrad)"/>
  <!-- Price tag / buy indicator -->
  <g transform="translate(310, 80)">
    <rect x="0" y="0" width="100" height="52" rx="26" fill="#fbbf24"/>
    <text x="50" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="26" fill="#1e1b4b">BUY</text>
  </g>
  <!-- Taka symbol in cart -->
  <text x="280" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="72" fill="url(#cartGrad)" opacity="0.7">৳</text>
</svg>
